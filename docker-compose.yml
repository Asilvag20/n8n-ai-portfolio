services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-portfolio
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Bogota
      - TZ=America/Bogota
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=#Nacional20
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_LOG_LEVEL=info
      # Flow 04 — Restaurant Bot variables (replace with your real values)
      - TELEGRAM_BOT_TOKEN=YOUR_BOT_TOKEN_HERE
      - TELEGRAM_OWNER_CHAT_ID=YOUR_OWNER_CHAT_ID_HERE
      - TELEGRAM_COCINA_GROUP_ID=YOUR_COCINA_GROUP_ID_HERE
      - PINECONE_API_KEY=YOUR_PINECONE_API_KEY_HERE
      - PINECONE_HOST=YOUR_PINECONE_HOST_HERE
      - GMAIL_DUENO=YOUR_OWNER_EMAIL_HERE
      - GOOGLE_SHEETS_ID=YOUR_SHEETS_ID_HERE
      - GOOGLE_DRIVE_FOLDER_ID=YOUR_DRIVE_FOLDER_ID_HERE
    volumes:
      - n8n_data:/home/node/.n8n
      - ./flows:/home/node/flows:ro
    networks:
      - n8n-network

volumes:
  n8n_data:
    driver: local

networks:
  n8n-network:
    driver: bridge